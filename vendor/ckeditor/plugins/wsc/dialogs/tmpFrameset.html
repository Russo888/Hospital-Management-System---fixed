<html>

<head>
	<title></title>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<script type="text/javascript">

		function doLoadScript(url) {
			if (!url)
				return false;

			var s = document.createElement("script");
			s.type = "text/javascript";

			// Righe modificate per correggere la vulnerabilità (Open Redirect + DOM XSS):
			// 1. Sanitizzazione base
			var safeUrl = url.toString().trim();

			// 2. Prevenzione DOM XSS: Blocco schemi URI pericolosi
			if (/^(javascript:|data:|vbscript:)/i.test(safeUrl)) {
				console.error("Tentativo di XSS bloccato: schema URL non consentito.");
				return false;
			}

			// 3. Prevenzione Open Redirect: Validazione del dominio (solo origin corrente o percorsi relativi)
			var isExternalUrl = /^(?:[a-z]+:)?\/\//i.test(safeUrl);
			if (isExternalUrl && safeUrl.indexOf(window.location.origin) !== 0) {
				console.error("Caricamento script bloccato: dominio non autorizzato.");
				return false;
			}

			s.src = safeUrl;

			document.getElementsByTagName("head")[0].appendChild(s);

			return true;
		}

		var opener;
		function tryLoad() {
			opener = window.parent;

			// get access to global parameters
			var oParams = window.opener.oldFramesetPageParams;

			// make frameset rows string prepare
			var sFramesetRows = (parseInt(oParams.firstframeh, 10) || '30') + ",*," + (parseInt(oParams.thirdframeh, 10) || '150') + ',0';
			document.getElementById('itFrameset').rows = sFramesetRows;

			// dynamic including init frames and crossdomain transport code
			// from config sproxy_js_frameset url
			var addScriptUrl = oParams.sproxy_js_frameset;
			doLoadScript(addScriptUrl);
		}

	</script>
</head>

<frameset id="itFrameset" onload="tryLoad();" border="0" rows="30,*,*,0">
	<frame scrolling="no" framespacing="0" frameborder="0" noresize="noresize" marginheight="0" marginwidth="2" src=""
		name="navbar"></frame>
	<frame scrolling="auto" framespacing="0" frameborder="0" noresize="noresize" marginheight="0" marginwidth="0" src=""
		name="mid"></frame>
	<frame scrolling="no" framespacing="0" frameborder="0" noresize="noresize" marginheight="1" marginwidth="1" src=""
		name="bot"></frame>
	<frame scrolling="no" framespacing="0" frameborder="0" noresize="noresize" marginheight="1" marginwidth="1" src=""
		name="spellsuggestall"></frame>
</frameset>

</html>
